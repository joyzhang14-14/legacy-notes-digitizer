# ============================================
# 教案数字化工具 — 配置文件
# ============================================

# 输入输出路径
paths:
  input_dir: "./input/"
  intermediate_dir: "./intermediate/"
  output_dir: "./output/"

# 预处理参数（Step 1）
preprocessing:
  dpi: 300                    # PDF转图片的分辨率，300一般够用
  clahe_clip_limit: 2.0       # 对比度增强强度，扫描件很暗时可调到3.0
  clahe_tile_size: 8          # CLAHE网格大小
  adaptive_block_size: 15     # 自适应阈值的block大小
  adaptive_c: 4               # 自适应阈值的常数C

# Claude Vision 分析参数（Step 2）
analysis:
  model: "claude-sonnet-4-20250514"
  max_concurrent: 3           # 并发请求数，避免rate limit
  request_interval: 1.0       # 每次请求间隔（秒）
  max_retries: 3              # 失败重试次数
  retry_delay: 60             # 重试等待时间（秒）
  max_tokens: 4096            # 每次请求最大token

# 线稿增强参数（Step 3）
line_enhancement:
  # 模式1: 加深原线条（保留手绘质感）
  strengthen:
    enabled: true
    line_thickness_add: 1     # 额外加粗像素数（1-3）
    contrast_boost: 1.5       # 线条对比度增强倍数
    denoise_kernel: 2         # 去噪核大小
    edge_method: "canny"      # 边缘检测方法: canny / adaptive

  # 模式2: 矢量化重绘（干净的电脑线条）
  vectorize:
    enabled: true
    potrace_turdsize: 5       # 忽略的最小斑点大小
    potrace_alphamax: 1.0     # 角点平滑度 (0=尖角, 1.334=最平滑)
    potrace_opttolerance: 0.2 # 曲线优化容差
    stroke_width: 1.5         # 矢量线条宽度（pt）
    stroke_color: "#1a1a1a"   # 矢量线条颜色
    detect_dashed: true       # 是否尝试识别虚线
    detect_arrows: true       # 是否尝试识别箭头

# 合成输出参数（Step 4）
compose:
  # PDF设置
  pdf:
    layer_name: "数字化文字"        # 图层名称
    mask_color: [255, 255, 255]    # 遮罩颜色 (白色)
    mask_padding: 3                 # 遮罩边距（像素）

  # PPT设置
  pptx:
    slide_width: 13.33             # 英寸
    slide_height: 7.5

  # 字体映射
  fonts:
    title:
      name: "STHeiti"              # macOS 黑体
      fallback: "SimHei"           # Windows 黑体
      size_range: [28, 36]
      bold: true
    subtitle:
      name: "STHeiti"
      fallback: "SimHei"
      size_range: [20, 24]
      bold: false
    body:
      name: "STFangsong"           # macOS 仿宋
      fallback: "FangSong"
      size_range: [14, 18]
      bold: false
    annotation:
      name: "STKaiti"              # macOS 楷体
      fallback: "KaiTi"
      size_range: [10, 14]
      bold: false
    label:
      name: "STHeiti"
      fallback: "SimHei"
      size_range: [10, 14]
      bold: false

  # 颜色映射
  colors:
    black: [0, 0, 0]
    red: [217, 25, 25]
    blue: [25, 51, 191]

# 质量检查参数（Step 5）
qa:
  low_confidence_threshold: 0.7    # 低于此值标记为需要校对
  comparison_dpi: 150              # 对比图分辨率
